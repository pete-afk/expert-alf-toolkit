# Korean language configuration for clustering pipeline
tagging:
  empty_label: "빈_클러스터"
  empty_category: "기타"
  empty_keywords: "비어있음, 데이터없음"
  empty_log: "클러스터 {cluster_id} ({size}건): 샘플 없음 → 건너뜀"
  conv_block_header: "[상담 {i}]"
  source_real_short: "실제 대화"
  source_real: "실제 고객 대화 메시지"
  source_summary: "상담 요약"
  label_instruction: "label은 이 클러스터의 핵심 주제를 4-6 단어 한국어로 작성하세요. 예: '배송_지연_문의', 'AS_접수_요청'"
  default_label: "클러스터_{cluster_id}"
  default_category: "미분류"
  cluster_block_header: "### 클러스터 {cluster_id} ({size}건)"
  agent_fallback_log: "Agent 태깅 실패 ({error}), API 방식으로 전환합니다."
  api_prompt: |
    당신은 고객 상담 데이터 분석 전문가입니다.

    아래는 하나의 클러스터에 속한 {source_label} {n_samples}건입니다 (전체 {cluster_size}건 중).

    {sample_text}

    위 상담들의 공통 주제를 분석하여 아래 JSON 형식으로 응답하세요:
    {{
      "label": "<{label_instruction}>",
      "category": "<상위 카테고리: 구매상담, 배송, AS, 기술지원, 계정, 결제, 기타 중 택1>",
      "keywords": ["키워드1", "키워드2", "키워드3"]
    }}

    JSON만 출력하세요.
  agent_prompt: |
    당신은 고객 상담 데이터 분석 전문가입니다.

    아래는 고객 상담 클러스터링 결과입니다. 각 클러스터에 {source_label}이 포함되어 있습니다.

    {all_clusters_text}

    모든 클러스터를 분석하여 아래 JSON 배열 형식으로 응답하세요:
    [
      {{
        "cluster_id": <클러스터 번호>,
        "cluster_size": <건수>,
        "label": "<핵심 주제 4-6 단어, 예: 배송_지연_문의>",
        "category": "<상위 카테고리: 구매상담, 배송, AS, 기술지원, 계정, 결제, 기타 중 택1>",
        "keywords": "<쉼표 구분 키워드 3-5개>"
      }},
      ...
    ]

    주의사항:
    - 모든 클러스터에 대해 응답하세요
    - label은 구체적이고 구분 가능하게 작성하세요
    - category는 반드시 위 목록 중 하나를 선택하세요
    - JSON 배열만 출력하세요
