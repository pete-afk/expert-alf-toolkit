tagging:
  empty_label: "빈 데이터"
  empty_category: "시스템"
  empty_keywords: "empty, 텍스트없음, 자동분류"
  empty_log: "클러스터 {cluster_id} ({size}건): 빈 데이터 → 자동 분류"
  source_real: "실제 대화 메시지"
  source_real_short: "실제 대화"
  source_summary: "요약 텍스트"
  conv_block_header: "[상담 {i}]"
  cluster_block_header: "[클러스터 {cluster_id}] (n={size}건)"
  default_label: "클러스터 {cluster_id}"
  default_category: "기타"
  agent_fallback_log: "Agent 태깅 실패 (에러: {error}), API 방식으로 폴백..."
  label_instruction: "간결한 한글 라벨 (3-8자)"
  api_prompt: |
    다음은 고객 상담 {source_label}입니다. 이 클러스터를 대표하는 라벨을 생성하세요.

    클러스터 크기: {cluster_size}건

    샘플 ({n_samples}건):
    {sample_text}

    다음 형식으로 JSON 응답:
    {{
      "label": "{label_instruction}",
      "category": "적절한 카테고리 (자유롭게)",
      "keywords": ["키워드1", "키워드2", "키워드3"]
    }}
  agent_prompt: |
    다음은 고객 상담 데이터를 클러스터링한 결과입니다. 각 클러스터에는 {source_label}가 포함되어 있습니다.

    {all_clusters_text}

    당신의 임무:
    1. 전체 클러스터를 분석하여 이 데이터셋의 특성(업종, 문의 유형)을 파악하세요
    2. 데이터에 적합한 카테고리 체계를 생성하세요 (5-10개 정도)
    3. 각 클러스터를 일관되게 분류하세요

    요구사항:
    - 카테고리는 상호 배타적이고 전체를 포괄해야 함
    - 클러스터 간 비교하며 일관된 기준으로 분류
    - "기타"는 최소화 (정말 분류 불가능한 경우만)
    - 라벨은 간결하게 3-8자

    다음 형식의 JSON 배열로 응답:
    [
      {{
        "cluster_id": 0,
        "cluster_size": 100,
        "label": "배송 지연 문의",
        "category": "배송",
        "keywords": ["배송", "지연", "조회"]
      }},
      ...
    ]

    JSON만 출력하세요 (추가 설명 없이).

config:
  api_key_error: |
    ❌ UPSTAGE_API_KEY not found!

    또는 직접 설정하려면:
      1. .env 파일 생성: cp .env.example .env
      2. .env 파일에 추가: UPSTAGE_API_KEY=up_your_key_here
      3. API 키 발급: https://console.upstage.ai/
